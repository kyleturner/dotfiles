# ~/.config/mise/config.toml
# Global mise config. Per-project .mise.toml files override/extend this.
# mise is the single source of truth for all runtime versions and env var loading —
# see runbook-guide.md Section 4.4 and the alias-vs-mise-task rule in 4.3.

[tools]
node      = "22"          # LTS — keeps existing pnpm projects working
bun       = "latest"      # new projects default
python    = "3.12"        # mise is the sole owner of Python — no brew python@X.Y needed
go        = "latest"
rust      = "stable"
java      = "temurin-21"  # iOS/Android tooling
terraform = "latest"
kubectl   = "latest"
pitchfork = "latest"      # background process supervision — see Section 4.14

[env]
# Resolved secrets — gitignored, generated via op inject. See dot_config/secrets/dot_env.global.tpl
# and .chezmoiscripts/run_onchange_after_50-resolve-secrets.sh.tmpl for how this file is built.
_.file = "~/.config/secrets/.env.global"

EDITOR = "cursor"
MISE_NODE_DEFAULT_PACKAGES_FILE = "~/.default-node-packages"

# Homebrew casks don't auto-update by default — this opts Claude Code itself into
# background updates despite the cask install. See Section 4.16.
CLAUDE_CODE_PACKAGE_MANAGER_AUTO_UPDATE = "1"

# Restricts codebase-memory-mcp's index_repository to this directory tree — a real
# security guardrail given this machine's client/consulting repo access, not optional.
# See Section 4.17.
CBM_ALLOWED_ROOT = "~/Projects"

# Manual-activation shortcuts for codebase-memory-mcp — see Section 4.17. Deliberately
# NOT a mise `[hooks] enter` auto-trigger on cd: per-project activation stays a deliberate
# moment (to also confirm CBM_ALLOWED_ROOT is scoped correctly), just a faster one to invoke.
# Callable by both humans and non-interactive pipeline agents (`Bash(mise run *)` is
# already allowlisted in every base-generated project's .claude/settings.json).
[tasks."memory:index"]
description = "Index the current directory into codebase-memory-mcp (manual, by design — Section 4.17)"
run = "codebase-memory-mcp cli index_repository --repo-path \"$PWD\""

[tasks."memory:status"]
description = "Show codebase-memory-mcp index status for the current directory, if indexed"
run = '''
match=$(codebase-memory-mcp cli --json list_projects 2>/dev/null | jq -r --arg p "$PWD" '.structuredContent.projects[] | select(.root_path == $p) | .name' | head -1)
if [ -z "$match" ]; then
  echo "Not indexed: $PWD"
  echo "Run: mise run memory:index"
else
  codebase-memory-mcp cli index_status --project "$match"
fi
'''
