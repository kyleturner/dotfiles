# ~/.config/tmuxp/_template.yaml
# Copy this to a project-specific file (e.g. myapp.yaml) and adjust.
# See runbook-guide.md Section 14.4.
#
# RULE: every pane that runs a project-specific command calls `mise run <task>`,
# never the underlying tool directly. tmuxp only ever describes shape (panes, names),
# never implementation — that lives in the project's .mise.toml [tasks].

session_name: CHANGE_ME
start_directory: ~/Projects/CHANGE_ME
windows:
  - window_name: editor
    panes:
      - cursor .
  - window_name: dev
    panes:
      - mise run dev
  - window_name: test
    panes:
      - mise run test:watch
  - window_name: shell
    panes:
      - git status
