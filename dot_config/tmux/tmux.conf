# ~/.config/tmux/tmux.conf
# Session persistence layer — see runbook-guide.md Section 14.

# True color passthrough — local Ghostty sessions.
# Ghostty sets TERM=xterm-ghostty automatically and ships a real terminfo entry for it.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:Tc"

# Prefix: Ctrl+\ — ergonomic, and prefix+\ naturally opens a right split.
unbind C-b
set -g prefix 'C-\'
bind 'C-\' send-prefix

# Mouse support — click to switch panes, drag to resize.
set -g mouse on

# Lock window size to manual — with Ghostty native tabs, switching away from and
# back to a tab can send transient SIGWINCH resize events (tab-switch animation).
# The default `window-size latest` re-flows every window's pane layout to fit
# each such resize, silently drifting manually-set split ratios back toward an
# even/default layout. `manual` ignores that noise; size only changes when you
# explicitly resize.
set -g window-size manual

# Start windows and panes at 1, not 0 — matches how you'd count them visually.
set -g base-index 1
setw -g pane-base-index 1

# Increase scrollback — default 2000 is too small for build/dev server logs.
set -g history-limit 50000

# Vi-style copy mode — matches terminal conventions most developers already know.
setw -g mode-keys vi

# Don't let tmux rename windows automatically — tmuxp sets meaningful names.
set -g allow-rename off

# Fast escape time — prevents input lag noticeable in Vim/Cursor's terminal panes.
set -sg escape-time 10

# Reload config without restarting session.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# Direct bindings (no prefix) — Option+key via macos-option-as-alt = true in Ghostty.
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# Pane navigation — vim-style.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Zoom current pane (toggle fullscreen).
bind -n M-z resize-pane -Z

# Window navigation.
bind -n M-, previous-window
bind -n M-. next-window

# New windows open in current pane's directory (prefix+c kept — less frequent).
bind c new-window -c "#{pane_current_path}"

# NOTE: local tmux works out of the box, but `ssh` + `tmux` to a remote host without
# Ghostty's terminfo entry will break with "missing or unsuitable terminal: xterm-ghostty"
# unless dot_config/ghostty/config has `shell-integration-features = ssh-env,ssh-terminfo`
# set. See Section 14.3 Callout #3.

# =============================================================================
# Status bar — Catppuccin Mocha palette, matches Ghostty theme
# =============================================================================
# Catppuccin Mocha palette refs:
#   Base      #1e1e2e   Surface0  #313244   Overlay0  #6c7086
#   Blue      #89b4fa   Mauve     #cba6f7   Green     #a6e3a1
#   Text      #cdd6f4   Subtext0  #a6adc8

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left "#[fg=#89b4fa,bold,bg=#313244]  #S #[bg=#1e1e2e,fg=#313244]"
set -g status-left-length 30

# Window list — inactive and active styles
setw -g window-status-separator ""
setw -g window-status-format         "#[fg=#6c7086,bg=#1e1e2e]  #I #W  "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold]  #I #W  #[bg=#1e1e2e,fg=#cba6f7]"

# Right: active pane process → RAM → CPU → time
# #{ram_percentage} and #{cpu_percentage} come from the tmux-cpu plugin.
set -g status-right "#[fg=#6c7086]#{pane_current_command}  #[fg=#a6e3a1]󰍛 #{ram_percentage}  #[fg=#89b4fa] #{cpu_percentage}  #[fg=#a6adc8] %H:%M  %d %b"
set -g status-right-length 80

# Pane border colors
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# =============================================================================
# Plugins — managed by tpack (brew-installed binary, drop-in TPM replacement)
# Install:  prefix + I      Update: prefix + U      TUI: tpack
# =============================================================================
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'eduwass/tmux-palette'

# tmux-palette — Raycast/VSCode-style command palette for tmux (Bun-powered).
# Behavior and theme live in ~/.config/tmux-palette/*.json (chezmoi-managed).
set -g @palette-key 'C-Space'          # no-prefix — open the main command palette
set -g @palette-find-pane-key 'M-f'    # no-prefix — jump to any pane by search
set -g @palette-move-pane-key 'M-m'    # no-prefix — move current pane by search

# Keep this line at the very bottom.
run 'tpack init'
