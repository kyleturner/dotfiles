# ~/.config/tmux/tmux.conf
# Session persistence layer — see runbook-guide.md Section 14.

# True color passthrough — local Ghostty sessions.
# Ghostty sets TERM=xterm-ghostty automatically and ships a real terminfo entry for it.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:Tc"

# Prefix: keep default (Ctrl-b) — no reason to relearn muscle memory without a specific complaint.
# Mouse support — click to switch panes, drag to resize.
set -g mouse on

# Start windows and panes at 1, not 0 — matches how you'd count them visually.
set -g base-index 1
setw -g pane-base-index 1

# Increase scrollback — default 2000 is too small for build/dev server logs.
set -g history-limit 50000

# Vi-style copy mode — matches terminal conventions most developers already know.
setw -g mode-keys vi

# Don't let tmux rename windows automatically — tmuxp sets meaningful names.
set -g allow-rename off

# Fast escape time — prevents input lag noticeable in Vim/Cursor's terminal panes.
set -sg escape-time 10

# Reload config without restarting session.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# Splits — intuitive keys, open in current pane's directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation — vim-style (h/j/k/l).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New windows also open in current pane's directory.
bind c new-window -c "#{pane_current_path}"

# NOTE: local tmux works out of the box, but `ssh` + `tmux` to a remote host without
# Ghostty's terminfo entry will break with "missing or unsuitable terminal: xterm-ghostty"
# unless dot_config/ghostty/config has `shell-integration-features = ssh-env,ssh-terminfo`
# set. See Section 14.3 Callout #3.

# =============================================================================
# Status bar — Catppuccin Mocha palette, matches Ghostty theme
# =============================================================================
# Catppuccin Mocha palette refs:
#   Base      #1e1e2e   Surface0  #313244   Overlay0  #6c7086
#   Blue      #89b4fa   Mauve     #cba6f7   Green     #a6e3a1
#   Text      #cdd6f4   Subtext0  #a6adc8

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left "#[fg=#89b4fa,bold,bg=#313244]  #S #[bg=#1e1e2e,fg=#313244]"
set -g status-left-length 30

# Window list — inactive and active styles
setw -g window-status-separator ""
setw -g window-status-format         "#[fg=#6c7086,bg=#1e1e2e]  #I #W  "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold]  #I #W  #[bg=#1e1e2e,fg=#cba6f7]"

# Right: active pane process → RAM → CPU → time
# #{ram_percentage} and #{cpu_percentage} come from the tmux-cpu plugin.
set -g status-right "#[fg=#6c7086]#{pane_current_command}  #[fg=#a6e3a1]󰍛 #{ram_percentage}  #[fg=#89b4fa] #{cpu_percentage}  #[fg=#a6adc8] %H:%M  %d %b"
set -g status-right-length 80

# Pane border colors
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# =============================================================================
# Plugins — managed by TPM (~/.config/tmux/plugins/tpm)
# Install:  prefix + I      Update: prefix + U
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Keep this line at the very bottom.
run '~/.config/tmux/plugins/tpm/tpm'
